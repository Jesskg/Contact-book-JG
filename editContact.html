<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Edit Contact | Contact Book</title>
    </head>
    <body onload="getContact()">
        <div id="avatarImage"></div>
        <form id="editForm">
            <label for="firstname">First Name</label>
            <input type="text" name="firstname" id="firstname" readonly><br/>
            <label for="lastname">Last name</label>
            <input type="text" name="lastname" id="lastname" readonly><br/>
            <label for="mobile">Mobile</label>
            <input type="text" name="mobile" id="mobile" readonly><br/>
            <label for="email">Email</label>
            <input type="text" name="email" id="email" readonly><br/>
            <label for="avatar" id="avatarLabel" hidden>Change Profile Image</label><br/>
            <input type="file" name="avatar" id="avatar" accept="image/*" hidden><br/>
            <br/>
            <button type="submit" id="submitForm" hidden>Submit</button>
        </form>
        <br/><br/>
        <button id="homeLink" type="button">Home</button>
        <button id="editContact" type="button">Edit</button>
        <button id="deleteContact" type="button">Delete</button>

        <script src="config.js"></script>
        <script>
            var id = getId();
            document.getElementById("homeLink").addEventListener('click', homeLink);
            document.getElementById("editContact").addEventListener('click', enableEdit);
            document.getElementById("submitForm").addEventListener('click', submitForm);
            document.getElementById("deleteContact").addEventListener('click', deleteContact);

            function getId() {
                var url = window.location.href;
                var pos = url.search("=");
                return parseInt(url.slice(pos + 1));
            }

            function getContact() {
                var contacts = getContacts();
                var contact = contacts.find(function(c) { return c.id === id; });
                if (contact) {
                    displayOutput(contact);
                } else {
                    alert("Contact not found.");
                    homeLink();
                }
            }

            function displayOutput(contact) {
                if (contact.avatar) {
                    document.getElementById("avatarImage").innerHTML =
                        `<img src="${contact.avatar}" width="200" style="border-radius:8px;object-fit:cover;"/>`;
                } else {
                    document.getElementById("avatarImage").innerHTML =
                        `<div style="width:80px;height:80px;border-radius:50%;background:#ccc;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:bold;">${contact.firstname.charAt(0)}</div>`;
                }
                document.getElementById("firstname").value = contact.firstname;
                document.getElementById("lastname").value  = contact.lastname;
                document.getElementById("mobile").value    = contact.mobile;
                document.getElementById("email").value     = contact.email;
            }

            function enableEdit() {
                document.getElementById("firstname").readOnly = false;
                document.getElementById("lastname").readOnly  = false;
                document.getElementById("email").readOnly     = false;
                document.getElementById("mobile").readOnly    = false;
                document.getElementById("avatar").hidden      = false;
                document.getElementById("avatarLabel").hidden = false;
                document.getElementById("submitForm").hidden  = false;
            }

            function submitForm(e) {
                e.preventDefault();

                var contacts   = getContacts();
                var index      = contacts.findIndex(function(c) { return c.id === id; });
                var avatarFile = document.getElementById("avatar").files[0];

                function save(avatarData) {
                    contacts[index].firstname = document.getElementById("firstname").value.trim();
                    contacts[index].lastname  = document.getElementById("lastname").value.trim();
                    contacts[index].mobile    = document.getElementById("mobile").value.trim();
                    contacts[index].email     = document.getElementById("email").value.trim();
                    if (avatarData) contacts[index].avatar = avatarData;
                    saveContacts(contacts);
                    alert("Contact edited.");
                    homeLink();
                }

                if (avatarFile) {
                    var reader = new FileReader();
                    reader.onload = function(e) { save(e.target.result); };
                    reader.readAsDataURL(avatarFile);
                } else {
                    save(null);
                }
            }

            function deleteContact() {
                var confirmDelete = confirm("Delete contact. Are you sure?");
                if (confirmDelete) {
                    var contacts = getContacts();
                    var updated  = contacts.filter(function(c) { return c.id !== id; });
                    saveContacts(updated);
                    homeLink();
                }
            }

            function homeLink() {
                window.open("index.html", "_self");
            }
        </script>
    </body>
</html>
