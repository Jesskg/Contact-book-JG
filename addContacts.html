<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Add Contact | Contact Book</title>
    </head>
    <body>
        <br/>
        <form id="editForm">
            <label for="firstname">First Name</label>
            <input type="text" name="firstname" id="firstname"><br/>
            <label for="lastname">Last name</label>
            <input type="text" name="lastname" id="lastname"><br/>
            <label for="mobile">Mobile</label>
            <input type="text" name="mobile" id="mobile"><br/>
            <label for="email">Email</label>
            <input type="text" name="email" id="email"><br/>
            <label for="avatar">Select a file</label><br/>
            <input type="file" name="avatar" id="avatar" accept="image/*"><br/>
            <button type="submit" id="submitForm">Submit</button>
        </form>
        <br/>
        <button id="homeLink" type="button">Home</button>

        <script src="config.js"></script>
        <script>
            document.getElementById("submitForm").addEventListener('click', submitForm);
            document.getElementById("homeLink").addEventListener('click', homeLink);

            function submitForm(e) {
                e.preventDefault();

                var firstname = document.getElementById("firstname").value.trim();
                var lastname  = document.getElementById("lastname").value.trim();
                var mobile    = document.getElementById("mobile").value.trim();
                var email     = document.getElementById("email").value.trim();
                var avatarFile = document.getElementById("avatar").files[0];

                if (!firstname || !lastname) {
                    alert("First name and last name are required.");
                    return;
                }

                function save(avatarData) {
                    var contacts = getContacts();
                    contacts.push({
                        id: generateId(),
                        firstname: firstname,
                        lastname: lastname,
                        mobile: mobile,
                        email: email,
                        avatar: avatarData || ""
                    });
                    saveContacts(contacts);
                    alert("Contact added.");
                    homeLink();
                }

                if (avatarFile) {
                    var reader = new FileReader();
                    reader.onload = function(e) { save(e.target.result); };
                    reader.readAsDataURL(avatarFile);
                } else {
                    save("");
                }
            }

            function homeLink() {
                window.open("index.html", "_self");
            }
        </script>
    </body>
</html>
