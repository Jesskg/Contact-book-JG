<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Book</title>
    </head>
    <body onload="fetchContacts()">

        <div id="table">Contacts loading....</div>
        <button id="refresh" type="button">Refresh</button>
        <button id="addContact" type="button">Add Contact</button>

        <script src="config.js"></script>
        <script>
            document.getElementById("refresh").addEventListener('click', fetchContacts);
            document.getElementById("addContact").addEventListener('click', addContact);

            function fetchContacts() {
                var data = getContacts();
                displayOutput(data);
            }

            function displayOutput(data) {
                if (data.length === 0) {
                    document.getElementById("table").innerHTML = "<p>No contacts yet. Add one!</p>";
                    return;
                }

                output = "<table>";
                for (a in data) {
                    var avatarHtml = data[a].avatar
                        ? `<img src="${data[a].avatar}" width="40" style="border-radius:50%;object-fit:cover;height:40px;"/>`
                        : `<div style="width:40px;height:40px;border-radius:50%;background:#ccc;display:flex;align-items:center;justify-content:center;font-weight:bold;">${data[a].firstname.charAt(0)}</div>`;

                    output += `
                        <tr onclick="editContact(${data[a].id})" style="cursor:pointer;">
                           <td>${avatarHtml}</td>
                           <td><h5>${data[a].firstname}</h5></td>
                           <td><h5>${data[a].lastname}</h5></td>
                        </tr>
                    `;
                }
                output += "</table>";
                document.getElementById("table").innerHTML = output;
            }

            function addContact() {
                window.open("addContacts.html", "_self");
            }

            function editContact(id) {
                window.open("editContact.html?id=" + id, "_self");
            }
        </script>

    </body>
</html>
